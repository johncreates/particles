<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle Field</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- Gear toggle -->
  <button id="settings-toggle" aria-label="Open sidebar">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="16" height="14" rx="1.5"/>
      <line x1="13" y1="4" x2="13" y2="16"/>
    </svg>
  </button>

  <!-- Settings panel -->
  <aside id="settings-panel" aria-label="Settings">

    <p class="settings-title">Particles</p>

    <div class="control-group">
      <div class="control-label">
        <span>Count</span>
        <span class="value-display" id="count-slider-val">400</span>
      </div>
      <input type="range" id="count-slider" min="50" max="800" value="400" step="10" />
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>Size</span>
        <span class="value-display" id="size-slider-val">2px</span>
      </div>
      <input type="range" id="size-slider" min="1" max="5" value="2" step="0.5" />
    </div>

    <div class="divider"></div>
    <p class="settings-title">Behaviour</p>

    <div class="control-group">
      <div class="control-label">
        <span>Reactivity</span>
        <span class="value-display" id="reactivity-slider-val">50%</span>
      </div>
      <input type="range" id="reactivity-slider" min="0" max="100" value="50" />
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>Speed</span>
      </div>
      <div class="segmented segmented--5">
        <input type="radio" name="speed" id="sp-025" value="0.25" />
        <label for="sp-025">¼×</label>
        <input type="radio" name="speed" id="sp-05" value="0.5" />
        <label for="sp-05">½×</label>
        <input type="radio" name="speed" id="sp-1" value="1" checked />
        <label for="sp-1">1×</label>
        <input type="radio" name="speed" id="sp-2" value="2" />
        <label for="sp-2">2×</label>
        <input type="radio" name="speed" id="sp-4" value="4" />
        <label for="sp-4">4×</label>
      </div>
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>Idle energy</span>
        <span class="value-display" id="idle-slider-val">5%</span>
      </div>
      <input type="range" id="idle-slider" min="0" max="100" value="5" />
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>Depth</span>
        <span class="value-display" id="depth-slider-val">50%</span>
      </div>
      <input type="range" id="depth-slider" min="0" max="100" value="50" />
    </div>

    <div class="divider"></div>
    <p class="settings-title">Cloud</p>

    <div class="control-group">
      <div class="control-label">
        <span>Shape</span>
      </div>
      <div class="segmented segmented--icons">
        <input type="radio" name="grid-shape" id="gs-grid" value="grid" checked />
        <label for="gs-grid" title="Grid">
          <svg viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <circle cx="3.5" cy="3.5" r="1.5"/><circle cx="10" cy="3.5" r="1.5"/><circle cx="16.5" cy="3.5" r="1.5"/>
            <circle cx="3.5" cy="10" r="1.5"/><circle cx="10" cy="10" r="1.5"/><circle cx="16.5" cy="10" r="1.5"/>
            <circle cx="3.5" cy="16.5" r="1.5"/><circle cx="10" cy="16.5" r="1.5"/><circle cx="16.5" cy="16.5" r="1.5"/>
          </svg>
        </label>
        <input type="radio" name="grid-shape" id="gs-hex" value="hex" />
        <label for="gs-hex" title="Hexagonal">
          <svg viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <circle cx="6.5" cy="2.5" r="1.4"/><circle cx="13.5" cy="2.5" r="1.4"/>
            <circle cx="3" cy="8" r="1.4"/><circle cx="10" cy="8" r="1.4"/><circle cx="17" cy="8" r="1.4"/>
            <circle cx="6.5" cy="13.5" r="1.4"/><circle cx="13.5" cy="13.5" r="1.4"/>
            <circle cx="3" cy="19" r="1.4"/><circle cx="10" cy="19" r="1.4"/><circle cx="17" cy="19" r="1.4"/>
          </svg>
        </label>
        <input type="radio" name="grid-shape" id="gs-radial" value="radial" />
        <label for="gs-radial" title="Radial">
          <svg viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <circle cx="10" cy="10" r="1.8"/>
            <circle cx="10" cy="4" r="1.3"/><circle cx="14.2" cy="5.8" r="1.3"/><circle cx="16" cy="10" r="1.3"/>
            <circle cx="14.2" cy="14.2" r="1.3"/><circle cx="10" cy="16" r="1.3"/>
            <circle cx="5.8" cy="14.2" r="1.3"/><circle cx="4" cy="10" r="1.3"/><circle cx="5.8" cy="5.8" r="1.3"/>
          </svg>
        </label>
      </div>
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>Grid size</span>
      </div>
      <div class="segmented">
        <input type="radio" name="cloud-size" id="cs-s" value="S" checked />
        <label for="cs-s">S</label>
        <input type="radio" name="cloud-size" id="cs-m" value="M" />
        <label for="cs-m">M</label>
        <input type="radio" name="cloud-size" id="cs-l" value="L" />
        <label for="cs-l">L</label>
        <input type="radio" name="cloud-size" id="cs-xl" value="XL" />
        <label for="cs-xl">XL</label>
      </div>
    </div>

    <div class="divider"></div>
    <p class="settings-title">Presets</p>
    <div class="preset-grid">
      <button class="preset-btn" data-preset="nebula">Nebula</button>
      <button class="preset-btn" data-preset="void">Void</button>
      <button class="preset-btn" data-preset="storm">Storm</button>
    </div>

    <button id="reroll-btn">Re-roll wave</button>
    <button id="export-btn">Save image</button>

  </aside>

  <p id="hint">click — attractor &nbsp;·&nbsp; alt+click — repulsor &nbsp;·&nbsp; hold — attract &nbsp;·&nbsp; double-click — shockwave &nbsp;·&nbsp; shift+click — hot particle</p>

  <script type="module" src="js/main.js"></script>
</body>
</html>
