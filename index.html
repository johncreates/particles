<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle Field</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- Gear toggle -->
  <button id="settings-toggle" aria-label="Toggle settings">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="10" cy="10" r="2.8"/>
      <path d="M10 2v1.5M10 16.5V18M2 10h1.5M16.5 10H18
               M4.1 4.1l1.1 1.1M14.8 14.8l1.1 1.1
               M4.1 15.9l1.1-1.1M14.8 5.2l1.1-1.1"/>
    </svg>
  </button>

  <!-- Settings panel -->
  <aside id="settings-panel" aria-label="Settings">

    <p class="settings-title">Particles</p>

    <div class="control-group">
      <div class="control-label">
        <span>Count</span>
        <span class="value-display" id="count-slider-val">300</span>
      </div>
      <input type="range" id="count-slider" min="50" max="800" value="300" step="10" />
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>Size</span>
        <span class="value-display" id="size-slider-val">2px</span>
      </div>
      <input type="range" id="size-slider" min="1" max="5" value="2" step="0.5" />
    </div>

    <div class="divider"></div>
    <p class="settings-title">Behaviour</p>

    <div class="control-group">
      <div class="control-label">
        <span>Reactivity</span>
        <span class="value-display" id="reactivity-slider-val">40%</span>
      </div>
      <input type="range" id="reactivity-slider" min="0" max="100" value="40" />
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>Idle energy</span>
        <span class="value-display" id="idle-slider-val">25%</span>
      </div>
      <input type="range" id="idle-slider" min="0" max="100" value="25" />
    </div>

    <div class="divider"></div>
    <p class="settings-title">Cloud</p>

    <div class="control-group">
      <div class="control-label">
        <span>Size</span>
      </div>
      <div class="segmented">
        <input type="radio" name="cloud-size" id="cs-s" value="S" />
        <label for="cs-s">S</label>
        <input type="radio" name="cloud-size" id="cs-m" value="M" checked />
        <label for="cs-m">M</label>
        <input type="radio" name="cloud-size" id="cs-l" value="L" />
        <label for="cs-l">L</label>
        <input type="radio" name="cloud-size" id="cs-xl" value="XL" />
        <label for="cs-xl">XL</label>
      </div>
    </div>

    <button id="reroll-btn">Re-roll shape</button>

  </aside>

  <script type="module" src="js/main.js"></script>
</body>
</html>
